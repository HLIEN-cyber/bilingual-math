<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wave Background Canvas Preview</title>
  <style>
    :root{ --radius:20px; }
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif;}
    body{display:grid;place-items:center;background:#f4f4f4;}
    .card{
      width:min(720px,92vw);
      aspect-ratio: 1.18 / 1; /* close to screenshot */
      border-radius:var(--radius);
      overflow:hidden;
      position:relative;
      box-shadow:0 12px 40px rgba(0,0,0,.08);
      background:#fff;
    }
    canvas{position:absolute;inset:0;width:100%;height:100%;}
    .label{
      position:absolute;inset:0;
      display:grid;place-items:center;
      pointer-events:none;
      color:rgba(255,255,255,.85);
      font-weight:500;
      letter-spacing:.3px;
      text-shadow:0 2px 10px rgba(0,0,0,.08);
    }
    .label span{font-size:clamp(16px,2.4vw,22px);}
    .hint{
      width:min(720px,92vw);
      color:#666;
      font-size:13px;
      line-height:1.6;
      margin-top:12px;
    }
    code{background:#eee;padding:.1em .35em;border-radius:6px;}
  </style>
</head>
<body>
  <div class="card" id="card">
    <canvas id="c"></canvas>
  </div>
  <div class="hint">
    這是純 <code>&lt;canvas&gt;</code> 的動態背景(不依賴任何外部套件)。
    若要當網站背景,把 <code>.card</code> 換成全螢幕容器即可。
  </div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  // HiDPI
  function resize(){
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const { width, height } = canvas.getBoundingClientRect();
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  const ro = new ResizeObserver(resize);
  ro.observe(document.getElementById('card'));
  window.addEventListener('resize', resize, { passive:true });

  // Helpers
  const lerp = (a,b,t)=>a+(b-a)*t;
  const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));

  // Palette (soft pastel like screenshot)
  const COLORS = {
    skyTop:   '#b8d4d2',
    skyMid:   '#d3dfd8',
    skyBot:   '#f1cfb4',
    wave1:    'rgba(204,231,239,0.92)',
    wave2:    'rgba(171,214,232,0.90)',
    wave3:    'rgba(138,186,214,0.92)',
    lineHi:   'rgba(255,255,255,0.65)',
    lineSoft: 'rgba(255,255,255,0.25)'
  };

  function drawBackground(w,h,t){
    // sky gradient
    const g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0, COLORS.skyTop);
    g.addColorStop(0.55, COLORS.skyMid);
    g.addColorStop(1, COLORS.skyBot);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,w,h);

    // subtle diagonal light streaks
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.lineWidth = 1;
    for (let i=0;i<3;i++){
      const phase = t*0.25 + i*1.2;
      const y = h*(0.45 + 0.07*Math.sin(phase));
      ctx.strokeStyle = i===0 ? COLORS.lineHi : COLORS.lineSoft;
      ctx.beginPath();
      ctx.moveTo(w*0.20, y);
      ctx.quadraticCurveTo(w*0.55, y - h*0.10, w*0.85, y - h*0.02);
      ctx.stroke();
    }
    ctx.restore();
  }

  function wavePath({w,h,baseY,amp,tilt,seed, t, bumps=2.8}){
    // Build a smooth multi-curve wave using a few control points.
    const p = [];
    const segments = 5;
    for (let i=0;i<=segments;i++){
      const x = (w/segments)*i;
      const k = (i/segments) * Math.PI * bumps;
      const n = Math.sin(k + seed + t) * 0.7 + Math.sin(k*0.55 - seed*1.3 + t*0.7)*0.3;
      const y = baseY + n*amp + (i - segments/2)*tilt;
      p.push({x,y});
    }

    // Smooth spline (Catmull-Rom-ish via quadratic segments)
    ctx.beginPath();
    ctx.moveTo(0,h);
    ctx.lineTo(p[0].x, p[0].y);

    for (let i=1;i<p.length-1;i++){
      const cx = p[i].x;
      const cy = p[i].y;
      const nx = (p[i].x + p[i+1].x)/2;
      const ny = (p[i].y + p[i+1].y)/2;
      ctx.quadraticCurveTo(cx, cy, nx, ny);
    }
    ctx.quadraticCurveTo(p[p.length-1].x, p[p.length-1].y, w, p[p.length-1].y);
    ctx.lineTo(w,h);
    ctx.closePath();
  }

  function drawWaves(w,h,t){
    const drift = t*0.6;

    // Back wave
    wavePath({
      w,h,
      baseY: h*0.64,
      amp: h*0.055,
      tilt: -h*0.010,
      seed: 1.2,
      t: drift,
      bumps: 2.6
    });
    ctx.fillStyle = COLORS.wave3;
    ctx.fill();

    // Mid wave
    wavePath({
      w,h,
      baseY: h*0.70,
      amp: h*0.050,
      tilt: -h*0.006,
      seed: 2.1,
      t: drift*1.05,
      bumps: 2.8
    });
    ctx.fillStyle = COLORS.wave2;
    ctx.fill();

    // Front wave
    wavePath({
      w,h,
      baseY: h*0.78,
      amp: h*0.042,
      tilt: -h*0.002,
      seed: 3.2,
      t: drift*1.1,
      bumps: 3.0
    });
    ctx.fillStyle = COLORS.wave1;
    ctx.fill();

    // soft highlight curve along top of front wave
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    const y0 = h*0.78 + Math.sin(drift*1.1 + 3.2)*h*0.012;
    ctx.moveTo(w*0.02, y0);
    ctx.bezierCurveTo(w*0.28, y0-h*0.05, w*0.55, y0+h*0.02, w*0.98, y0-h*0.02);
    ctx.stroke();
    ctx.restore();
  }

  let start = performance.now();
  function frame(now){
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const t = (now - start) / 1000;

    drawBackground(w,h,t);
    drawWaves(w,h,t);

    requestAnimationFrame(frame);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
